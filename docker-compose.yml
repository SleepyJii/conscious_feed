# Root compose — brings up all ConsciousFeed services

services:
  conductor:
    build: ./fleet-conductor
    ports:
      - "8000:8000"
    volumes:
      # DinD: access the host Docker daemon to manage scraper containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist the generated fleet compose file across restarts
      - conductor-fleet:/app/fleet
      # Shared volume for per-scraper scripts
      - fleet-shared:/fleet-shared
    networks:
      - conscious-feed
    restart: unless-stopped
  
  db:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: conscious_feed
      POSTGRES_PASSWORD: conscious_feed
      POSTGRES_DB: scrape_db
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres_data:/var/lib/postgresql/data
      - ./volumes/db-init:/docker-entrypoint-initdb.d
    networks:
      - conscious-feed

  db-restful:
    build: ./db-restful
    container_name: restful_db
    depends_on:
      - db
    networks:
      - conscious-feed

  # hybrid-scraper is managed dynamically by the conductor.
  # This entry is build-only — it won't start with `docker compose up`.
  hybrid-scraper:
    build: ./hybrid-scraper
    image: conscious-feed/hybrid-scraper
    profiles: ["build-only"]

volumes:
  conductor-fleet:
    name: conductor-fleet
  fleet-shared:
    name: fleet-shared

networks:
  conscious-feed:
    name: conscious-feed
