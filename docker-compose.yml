# Root compose — brings up all ConsciousFeed services

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  conductor:
    build: ./containers/fleet-conductor
    container_name: conductor
    environment:
      REPAIR_CRON_SCHEDULE: "${REPAIR_CRON_SCHEDULE:-* * * * *}"
      MAX_CONCURRENT_REPAIRS: "${MAX_CONCURRENT_REPAIRS:-1}"
      REPAIR_TIMEOUT: "${REPAIR_TIMEOUT:-900}"
    volumes:
      # DinD: access the host Docker daemon to manage scraper containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Fleet data: compose file, per-scraper scripts, shared state
      - fleet-data:/fleet-data
    networks:
      - conscious-feed
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

  db:
    build: ./containers/db
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: conscious_feed
      POSTGRES_PASSWORD: conscious_feed
      POSTGRES_DB: scrape_db
      RETENTION_CONTENT_DAYS: "${RETENTION_CONTENT_DAYS:-30}"
      RETENTION_RUNS_DAYS: "${RETENTION_RUNS_DAYS:-90}"
      RETENTION_EVENTS_DAYS: "${RETENTION_EVENTS_DAYS:-14}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./volumes/db-init:/docker-entrypoint-initdb.d
    logging: *default-logging
    networks:
      - conscious-feed

  db-restful:
    build: ./containers/db-restful
    container_name: restful_db
    depends_on:
      - db
    networks:
      - conscious-feed
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

  scraper-ui:
    build: ./containers/scraper-ui
    container_name: scraper_ui
    depends_on:
      db-restful:
        condition: service_healthy
      conductor:
        condition: service_healthy
    ports:
      - "5173:5173"
    restart: unless-stopped
    logging: *default-logging
    networks:
      - conscious-feed

  mcp-proxy:
    build: ./containers/mcp-proxy
    container_name: mcp_proxy
    ports:
      - "9200:8080"
    networks:
      - conscious-feed
    logging: *default-logging
    restart: unless-stopped

  # hybrid-scraper is managed dynamically by the conductor.
  # This entry is build-only — it won't start with `docker compose up`.
  hybrid-scraper:
    build: ./containers/hybrid-scraper
    image: conscious-feed/hybrid-scraper
    profiles: ["build-only"]

  dev-agent:
    build:
      context: ./containers/dev-agent
      args:
        ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
        MODEL_ALIASES: "${MODEL_ALIASES}"
    image: conscious-feed/dev-agent
    profiles: ["build-only"]

volumes:
  fleet-data:
    name: fleet-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/fleet-data
  postgres-data:
    name: postgres-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/postgres_data

networks:
  conscious-feed:
    name: conscious-feed
