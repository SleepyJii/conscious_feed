# Root compose — brings up all ConsciousFeed services

services:
  conductor:
    build: ./fleet-conductor
    ports:
      - "8000:8000"
    volumes:
      # DinD: access the host Docker daemon to manage scraper containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist the generated fleet compose file across restarts
      - conductor-fleet:/app/fleet
      # Shared volume for per-scraper scripts
      - fleet-shared:/fleet-shared
    networks:
      - conscious-feed
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: conscious_feed
      POSTGRES_USER: conscious_feed
      POSTGRES_PASSWORD: conscious_feed
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - conscious-feed
    ports:
      - "5432:5432"

  # hybrid-scraper is managed dynamically by the conductor,
  # not defined statically here.

volumes:
  conductor-fleet:
  fleet-shared:
  pgdata:

networks:
  conscious-feed:
    name: conscious-feed
